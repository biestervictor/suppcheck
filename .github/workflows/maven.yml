name: Java CI with Maven
env:
  MY_SECRET: ${{ secrets.ACTION_GITHUB_TOKEN  }}

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'helmcharts/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'helmcharts/**'

permissions:
  contents: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ACTION_GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java

      - name: Build with Maven
        run: mvn clean install -Dspring.profiles.active=ci

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Extracted version: $VERSION"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          output: results.sarif

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        if: github.actor != 'dependabot[bot]'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ACTION_GITHUB_TOKEN }}

      - name: Build Docker image
        if: github.actor != 'dependabot[bot]'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}

      - name: Update Helm values with new image tag
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Updating image tag to ${{ github.sha }} and appVersion to ${VERSION}"
          sed -i "s|^  tag: .*|  tag: \"${{ github.sha }}\"|" helmcharts/values.yaml
          sed -i "s|^appVersion: .*|appVersion: \"${VERSION}\"|" helmcharts/Chart.yaml
          echo "--- values.yaml (image block) ---"
          grep -A2 "^image:" helmcharts/values.yaml
          echo "--- Chart.yaml (appVersion) ---"
          grep "appVersion" helmcharts/Chart.yaml

      - name: Commit and push updated image tag
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helmcharts/values.yaml helmcharts/Chart.yaml
          git diff --cached --quiet || git commit -m "ci: update image tag to ${{ github.sha }} (v${VERSION})"
          git pull --rebase origin main
          git push origin main

      - name: Create Git version tag
        if: github.actor != 'dependabot[bot]' && github.event_name == 'push'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          git tag -f "v${VERSION}" -m "Release v${VERSION}"
          git push -f origin "v${VERSION}"

