apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.suppcheck.name}}
  namespace: {{ .Values.suppcheck.nameSpace}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.suppcheck.name}}
  template:
    metadata:
      labels:
        app: {{ .Values.suppcheck.name}}
    spec:
      imagePullSecrets:
        - name: regcred
      containers:
        - name: {{ .Values.suppcheck.name}}
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: [ "java", "-jar", "app.jar" ]
          args: [ "--spring.profiles.active=kubitos" ]
          env:
            - name: TZ
              value: "Europe/Berlin"
            - name: SPRING_MONGODB_URI
              {{- if .Values.mongodb.auth }}
              valueFrom:
                secretKeyRef:
                  name: mongodb-credentials
                  key: MONGODB_URI
              {{- else }}
              value: "mongodb://{{ .Values.mongodb.host }}:{{ .Values.mongodb.port }}/{{ .Values.mongodb.database }}"
              {{- end }}
          ports:
            - containerPort: {{ .Values.suppcheck.deployment.port}}
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.suppcheck.deployment.port }}
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 30
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.suppcheck.deployment.port }}
            periodSeconds: 15
            failureThreshold: 3
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.suppcheck.deployment.port }}
            periodSeconds: 10
            failureThreshold: 3
            timeoutSeconds: 5
