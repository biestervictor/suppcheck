<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="nav-styles">
        <style>
            nav {
                background: #2d6cdf;
                padding: 12px 24px;
            }

            nav a {
                color: #fff;
                text-decoration: none;
                margin-right: 18px;
                font-weight: bold;
            }

            nav a:hover {
                text-decoration: underline;
            }

            .env-badge {
                display: inline-block;
                padding: 2px 10px;
                border-radius: 4px;
                font-size: 0.75em;
                font-weight: bold;
                letter-spacing: 0.5px;
                margin-right: 8px;
                vertical-align: middle;
            }

            .env-badge-prod {
                background: #e74c3c;
                color: #fff;
            }

            .env-badge-dev {
                background: #27ae60;
                color: #fff;
            }
        </style>
    </th:block>

    <nav th:fragment="main-nav" style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap;">
        <span>
            <a th:href="@{/supplements/new}">Neues Supplement anlegen</a> |
            <a th:href="@{/supplements/ingredients/summary}">Tägliche Einnahme-Übersicht</a> |
            <a th:href="@{/supplements}">Supplemente Übersicht</a> |
            <a th:href="@{/supplements/compare}">Supplement Vergleich</a> |
            <a th:href="@{/costs/history}">Kostenentwicklung</a>
        </span>
        <span style="font-size:0.75em; color:#c0d4f5; font-weight:normal; white-space:nowrap;">
            <span th:if="${isProd}" class="env-badge env-badge-prod">PROD</span>
            <span th:unless="${isProd}" class="env-badge env-badge-dev">DEV</span>
            <span th:text="${mongoHost}" style="margin-right:10px;"></span>
            · v<span th:text="${appVersion}"></span>
            · Build <span th:text="${buildTimestamp}"></span>
        </span>
    </nav>
</th:block>
