<th:block xmlns:th="http://www.thymeleaf.org">
    <th:block th:fragment="banner-styles">
        <style>
            .banner {
                width: 60%;
                margin: 16px auto;
                border-radius: 6px;
                padding: 10px 14px;
                border: 1px solid transparent;
                text-align: center;
            }

            .banner-info {
                color: #0c5460;
                background: #d1ecf1;
                border-color: #bee5eb;
            }

            .banner-success {
                color: #155724;
                background: #d4edda;
                border-color: #c3e6cb;
            }
        </style>
    </th:block>

    <div th:fragment="banner(type, message)"
         class="banner"
         th:classappend="' banner-' + ${type}"
         th:text="${message}">
        Hinweis
    </div>
</th:block>
