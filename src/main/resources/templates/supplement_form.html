<!-- language: html -->
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
    <title>Neues Supplement anlegen</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }
        h1 {
            margin: 32px 0 16px 0;
            text-align: center;
            color: #2d6cdf;
        }
        form {
            background: #fff;
            padding: 32px;
            margin: 32px auto;
            width: 60%;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            border-radius: 6px;
        }
        label {
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            padding: 6px;
            margin: 4px 8px 12px 0;
            border: 1px solid #bfc9d1;
            border-radius: 3px;
        }
        button {
            background: #2d6cdf;
            color: #fff;
            border: none;
            padding: 6px 14px;
            border-radius: 4px;
            cursor: pointer;
            margin-right: 6px;
        }
        button:hover {
            background: #1b4e9b;
        }
        .ingredient-row {
            margin-bottom: 8px;
        }
        .subingredient-list {
            margin-left: 32px;
        }
        .ocr-section {
            background: #f0f4ff;
            border: 1px solid #c0d0f0;
            border-radius: 5px;
            padding: 14px 18px;
            margin-bottom: 18px;
        }
        .ocr-section label {
            display: block;
            margin-bottom: 8px;
        }
        #ocr-status {
            margin-left: 10px;
            font-style: italic;
            color: #555;
        }
        .whey-hint {
            display: none;
            background: #fffbe6;
            border: 1px solid #ffe58f;
            border-radius: 4px;
            padding: 6px 12px;
            margin-top: 6px;
            font-size: 0.9em;
            color: #7a5f00;
        }
    </style>
    <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>
<h1>Neues Supplement anlegen</h1>
<form method="post" th:action="@{/supplements/save}" th:object="${supplement}">
    <input type="hidden" th:if="*{id != null}" th:field="*{id}" />

    <label for="shop">Shop:</label>
    <select id="shop" th:field="*{shop}">
        <option th:value="''" th:text="'-- bitte wählen --'"></option>
        <option th:each="s : ${shops}"
                th:value="${s}"
                th:text="${s}">
        </option>
    </select>
    <label for="name">Name:</label>
    <input id="name" required th:field="*{name}" type="text"/><br/><br/>
    <label for="ovp">OVP (Originalpreis):</label>
    <input id="ovp" th:field="*{ovp}" type="number" step="any"/><br/><br/>
    <label for="discount">Rabatt (%):</label>
    <input id="discount" th:field="*{discount}" type="number" step="any" min="0" max="100"/><br/><br/>
    <label for="price">Preis (berechnet):</label>
    <input id="price" required th:field="*{price}" type="number" step="any" readonly
           style="background:#eef3fa; cursor:not-allowed;"/><br/><br/>
    <label for="portions">Portionen:</label>
    <input id="portions" required th:field="*{portionSize}" type="number"/><br/><br/>
    <br/><br/>
    <label for="type">Typ:</label>
    <select id="type" th:field="*{supplementType}" onchange="onTypeChanged(this.value)">
        <option th:value="''" th:text="'-- bitte wählen --'"></option>
        <option th:each="t : ${types}"
                th:value="${t}"
                th:text="${t}">
        </option>
    </select>
    <div id="whey-hint" class="whey-hint">
        Zutaten wurden aus vorhandenen Whey-Produkten vorbelegt – bitte Mengen (mg) ausfüllen.
    </div>
    <br/><br/>
    <label for="isInactive">Inaktiv:</label>
    <input id="isInactive" th:field="*{inactive}" type="checkbox"/><br/><br/>
    <label for="mhdProdukt">MHD-Produkt:</label>
    <input id="mhdProdukt" th:field="*{mhdProdukt}" type="checkbox"/><br/><br/>
    <label for="nonDaily">Nicht täglich:</label>
    <input id="nonDaily" th:field="*{nonDaily}" type="checkbox" onchange="toggleIntervalField(this.checked)"/><br/><br/>
    <div id="interval-container" th:style="${supplement.nonDaily} ? 'display:block' : 'display:none'">
        <label for="consumptionIntervalDays">Einnahme alle X Tage:</label>
        <input id="consumptionIntervalDays" th:field="*{consumptionIntervalDays}" type="number" min="2" step="1" style="width:80px;"/>
        <span style="color:#777;font-size:0.9em;margin-left:6px;">Tage (z.B. 3 = alle 3 Tage)</span><br/><br/>
    </div>

    <div id="ingredients-list">
        <div class="ingredient-row" th:each="ingredient, iStat : *{ingredients}">
            <input placeholder="Name" th:field="*{ingredients[__${iStat.index}__].name}" type="text"/>
            <input class="ingredient-mg" onfocus="this.select()" step="any" th:field="*{ingredients[__${iStat.index}__].mg}" type="number" />
            <button onclick="removeIngredient(this)" type="button">Entfernen</button>

            <div class="subingredient-list">
                <div th:each="sub, sStat : *{ingredients[__${iStat.index}__].subIngredients}">
                    <input th:field="*{ingredients[__${iStat.index}__].subIngredients[__${sStat.index}__].name}" placeholder="Sub-Name" type="text"/>
                    <input class="subingredient-mg" th:field="*{ingredients[__${iStat.index}__].subIngredients[__${sStat.index}__].mg}" placeholder="mg" type="number" step="any"/>
                    <button type="button" onclick="removeSubIngredient(this)">Entfernen</button>
                </div>
            </div>

            <button type="button" onclick="addSubIngredient(this)">Sub-Ingridient hinzufügen</button>
        </div>
    </div>

    <button onclick="addIngredient()" type="button">Zutat hinzufügen</button>
    <button type="submit">Speichern</button>

    <br/><br/>
    <div class="ocr-section">
        <label><strong>Nährwertbild hochladen (automatische Erkennung)</strong></label>
        <input type="file" id="ocr-image" accept="image/*"/>
        <button type="button" onclick="extractFromImage()">Zutaten erkennen</button>
        <span id="ocr-status"></span>
        <details id="ocr-raw-box" style="display:none; margin-top:10px;">
            <summary style="cursor:pointer; color:#555; font-style:italic;">OCR-Rohtext anzeigen</summary>
            <pre id="ocr-raw-text" style="background:#f8f8f8; border:1px solid #ddd; padding:8px; font-size:0.8em; white-space:pre-wrap; max-height:200px; overflow-y:auto; margin-top:6px;"></pre>
        </details>
    </div>
</form>

<th:block th:if="${param.success}">
    <th:block th:replace="~{fragments/banner :: banner('success', 'Supplement erfolgreich gespeichert!')}"></th:block>
</th:block>

<script>
    function updateIngredientIndices() {
        const rows = document.querySelectorAll('#ingredients-list .ingredient-row');
        rows.forEach((row, idx) => {
            const nameInput = row.querySelector('input[type="text"]:not([placeholder="Sub-Name"])');
            const mgInput = row.querySelector('input.ingredient-mg');
            if (nameInput) nameInput.name = `ingredients[${idx}].name`;
            if (mgInput) mgInput.name = `ingredients[${idx}].mg`;

            const subList = row.querySelector('.subingredient-list');
            if (subList) {
                Array.from(subList.children).forEach((subDiv, sIdx) => {
                    const subName = subDiv.querySelector('input[placeholder="Sub-Name"]');
                    const subMg = subDiv.querySelector('input.subingredient-mg');
                    if (subName) subName.name = `ingredients[${idx}].subIngredients[${sIdx}].name`;
                    if (subMg) subMg.name = `ingredients[${idx}].subIngredients[${sIdx}].mg`;
                });
            }
        });
    }

    function addIngredient() {
        const list = document.getElementById('ingredients-list');
        const div = document.createElement('div');
        div.className = 'ingredient-row';
        div.innerHTML = `
            <input type="text" placeholder="Name" />
            <input type="number" step="any" placeholder="mg" class="ingredient-mg" />
            <button type="button" onclick="removeIngredient(this)">Entfernen</button>
            <div class="subingredient-list"></div>
            <button type="button" onclick="addSubIngredient(this)">Sub-Ingridient hinzufügen</button>
        `;
        list.appendChild(div);
        updateIngredientIndices();
    }

    function removeIngredient(btn) {
        btn.parentElement.remove();
        updateIngredientIndices();
    }

    function addSubIngredient(btn) {
        const row = btn.closest('.ingredient-row');
        const rows = Array.from(document.querySelectorAll('#ingredients-list .ingredient-row'));
        const ingredientIdx = rows.indexOf(row);

        const parent = row.querySelector('.subingredient-list');
        if (!parent) {
            alert('Fehler: subingredient-list nicht gefunden!');
            return;
        }
        const idx = parent.children.length;
        const div = document.createElement('div');
        div.innerHTML = `
            <input name="ingredients[${ingredientIdx}].subIngredients[${idx}].name" placeholder="Sub-Name" type="text"/>
            <input name="ingredients[${ingredientIdx}].subIngredients[${idx}].mg" placeholder="mg" type="number" step="any" class="subingredient-mg"/>
            <button type="button" onclick="removeSubIngredient(this)">Entfernen</button>
        `;
        parent.appendChild(div);
        updateIngredientIndices();
    }

    function removeSubIngredient(btn) {
        btn.parentElement.remove();
        updateIngredientIndices();
    }

    window.addEventListener('DOMContentLoaded', updateIngredientIndices);

    // Preis automatisch berechnen: OVP * (1 - Rabatt/100)
    function calculatePrice() {
        const ovpField = document.getElementById('ovp');
        const discountField = document.getElementById('discount');
        const priceField = document.getElementById('price');

        const ovp = parseFloat(ovpField.value);
        const discount = parseFloat(discountField.value) || 0;

        if (!isNaN(ovp) && ovp > 0) {
            const calculated = ovp * (1 - discount / 100);
            priceField.value = Math.round(calculated * 100) / 100;
        }
    }

    document.getElementById('ovp').addEventListener('blur', calculatePrice);
    document.getElementById('discount').addEventListener('blur', calculatePrice);

    // --- Whey Auto-fill ---

    function onTypeChanged(value) {
        if (value !== 'WHEY') return;

        fetch('/supplements/api/whey-template')
            .then(function(r) {
                if (!r.ok) throw new Error('Keine Vorlage verfügbar');
                return r.json();
            })
            .then(function(ingredients) {
                if (!ingredients || ingredients.length === 0) return;
                const list = document.getElementById('ingredients-list');
                list.innerHTML = '';
                ingredients.forEach(function(ing) {
                    addIngredientFromTemplate(ing);
                });
                updateIngredientIndices();
                document.getElementById('whey-hint').style.display = 'block';
            })
            .catch(function() {
                // No existing Whey supplements – silently ignore, user fills manually
            });
    }

    function addIngredientFromTemplate(ing) {
        const list = document.getElementById('ingredients-list');
        const div = document.createElement('div');
        div.className = 'ingredient-row';

        const subHtml = (ing.subIngredients || []).map(function(sub) {
            return '<div>' +
                '<input type="text" placeholder="Sub-Name" value="' + escapeHtml(sub.name) + '" />' +
                '<input type="number" step="any" placeholder="mg" class="subingredient-mg" value="' + (sub.mg != null ? sub.mg : '') + '" />' +
                '<button type="button" onclick="removeSubIngredient(this)">Entfernen</button>' +
                '</div>';
        }).join('');

        div.innerHTML =
            '<input type="text" placeholder="Name" value="' + escapeHtml(ing.name) + '" />' +
            '<input type="number" step="any" placeholder="mg" class="ingredient-mg" value="' + (ing.mg != null ? ing.mg : '') + '" />' +
            '<button type="button" onclick="removeIngredient(this)">Entfernen</button>' +
            '<div class="subingredient-list">' + subHtml + '</div>' +
            '<button type="button" onclick="addSubIngredient(this)">Sub-Ingridient hinzufügen</button>';

        list.appendChild(div);
    }

    // --- OCR Image Extraction ---

    function extractFromImage() {
        const fileInput = document.getElementById('ocr-image');
        const status = document.getElementById('ocr-status');

        if (!fileInput.files || fileInput.files.length === 0) {
            status.textContent = 'Bitte zuerst ein Bild auswählen.';
            return;
        }

        status.textContent = 'Wird erkannt…';

        const formData = new FormData();
        formData.append('image', fileInput.files[0]);

        fetch('/supplements/ocr-extract', {
            method: 'POST',
            body: formData
        })
        .then(function(r) {
            if (!r.ok) throw new Error('OCR-Fehler (HTTP ' + r.status + ')');
            return r.json();
        })
        .then(function(result) {
            const ingredients = result.ingredients || [];
            const rawText = result.rawText || '';

            // Show raw text in collapsible box
            const rawBox = document.getElementById('ocr-raw-box');
            const rawPre = document.getElementById('ocr-raw-text');
            if (rawText && rawBox) {
                rawPre.textContent = rawText;
                rawBox.style.display = 'block';
            }

            if (!ingredients || ingredients.length === 0) {
                status.textContent = 'Keine Zutaten erkannt – bitte manuell eintragen.';
                return;
            }
            const list = document.getElementById('ingredients-list');
            list.innerHTML = '';
            ingredients.forEach(function(ing) {
                addIngredientFromTemplate(ing);
            });
            updateIngredientIndices();
            status.textContent = ingredients.length + ' Zutat(en) erkannt und eingetragen.';
        })
        .catch(function(err) {
            status.textContent = 'Fehler: ' + err.message;
        });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;')
                  .replace(/"/g, '&quot;')
                  .replace(/</g, '&lt;')
                  .replace(/>/g, '&gt;');
    }

    function toggleIntervalField(checked) {
        document.getElementById('interval-container').style.display = checked ? 'block' : 'none';
    }
</script>
</body>
</html>
