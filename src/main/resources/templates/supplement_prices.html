<!-- language: html -->
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
    <title>Preisentwicklung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 32px 0 16px 0;
            text-align: center;
            color: #2d6cdf;
        }

        .container {
            width: 70%;
            margin: 24px auto;
            background: #fff;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-radius: 6px;
        }

        canvas {
            width: 100%;
            height: 360px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th, td {
            padding: 10px 14px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        th {
            background: #eaf1fb;
        }

    </style>
    <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>

<h1 th:text="|Preisentwicklung: ${supplement.shop} - ${supplement.name}|">Preisentwicklung</h1>

<th:block th:if="${supplement.prices == null or supplement.prices.isEmpty()}">
    <th:block th:replace="~{fragments/banner :: banner('info', 'Fuer dieses Supplement sind aktuell noch keine Preiswerte gespeichert.')}"></th:block>
</th:block>

<div class="container">
    <canvas id="priceChart" width="900" height="360"></canvas>

    <table>
        <thead>
        <tr>
            <th>Datum</th>
            <th>Preis</th>
            <th>OVP</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${supplement.prices}">
            <td th:text="${#temporals.format(p.date, 'yyyy-MM-dd')}">2026-01-01</td>
            <td th:text="${T(java.lang.String).format('%.2f €', p.price)}">0.00 €</td>
            <td th:text="${p.ovp > 0 ? T(java.lang.String).format('%.2f €', p.ovp) : '-'}">0.00 €</td>
        </tr>
        </tbody>
    </table>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const prices = /*[[${supplement.prices}]]*/ [];

    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');

    const padding = 40;
    const bottomPadding = 60;
    const w = canvas.width;
    const h = canvas.height;

    const monthMap = {
        'JANUARY': 1, 'FEBRUARY': 2, 'MARCH': 3, 'APRIL': 4, 'MAY': 5, 'JUNE': 6,
        'JULY': 7, 'AUGUST': 8, 'SEPTEMBER': 9, 'OCTOBER': 10, 'NOVEMBER': 11, 'DECEMBER': 12
    };

    function parseDate(d) {
        if (typeof d === 'object' && d !== null) {
            const year = d.year || d.Year;
            let month = d.monthValue || d.Month || d.month;
            if (typeof month === 'string') month = monthMap[month.toUpperCase()] || 1;
            const day = d.dayOfMonth || d.Day || d.day || 1;
            return `${day}.${month}.${year}`;
        }
        return String(d);
    }

    function drawAxes() {
        ctx.strokeStyle = '#c9d6ea';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, h - bottomPadding);
        ctx.lineTo(w - padding, h - bottomPadding);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        drawAxes();

        if (!prices || prices.length === 0) {
            ctx.fillStyle = '#888';
            ctx.font = '16px Arial';
            ctx.fillText('Keine Preisdaten vorhanden.', padding, padding + 20);
            return;
        }

        const priceValues = prices.map(p => Number(p.price));
        const ovpValues = prices.map(p => Number(p.ovp));
        const dates = prices.map(p => parseDate(p.date));

        const allValues = [...priceValues.filter(v => v > 0), ...ovpValues.filter(v => v > 0)];
        if (allValues.length === 0) { return; }
        const min = Math.min(...allValues);
        const max = Math.max(...allValues);
        const range = (max - min) || 1;

        const plotW = (w - 2 * padding);
        const plotH = (h - padding - bottomPadding);
        const xStep = prices.length === 1 ? 0 : plotW / (prices.length - 1);

        // Y-axis labels
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText(max.toFixed(2) + ' €', 6, padding + 4);
        ctx.fillText(min.toFixed(2) + ' €', 6, h - bottomPadding);

        // Draw a line for a given value extractor
        function drawLine(extractFn, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            prices.forEach((p, i) => {
                const val = extractFn(p);
                if (val <= 0) return;
                const x = padding + i * xStep;
                const y = (h - bottomPadding) - ((val - min) / range) * plotH;
                if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
            });
            ctx.stroke();

            // Points + labels
            prices.forEach((p, i) => {
                const val = extractFn(p);
                if (val <= 0) return;
                const x = padding + i * xStep;
                const y = (h - bottomPadding) - ((val - min) / range) * plotH;

                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.font = 'bold 11px Arial';
                const label = val.toFixed(2) + ' €';
                const lw = ctx.measureText(label).width;
                ctx.fillText(label, x - lw / 2, y - 8);
            });
        }

        // Date labels on x-axis
        prices.forEach((p, i) => {
            const x = padding + i * xStep;
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.save();
            ctx.translate(x, h - bottomPadding + 12);
            ctx.rotate(-Math.PI / 4);
            ctx.fillText(dates[i], 0, 0);
            ctx.restore();
        });

        drawLine(p => Number(p.price), '#2d6cdf');
        drawLine(p => Number(p.ovp), '#e68a00');

        // Legend
        const legends = [
            { label: 'Preis', color: '#2d6cdf' },
            { label: 'OVP', color: '#e68a00' }
        ];
        let lx = padding;
        ctx.font = '13px Arial';
        legends.forEach(l => {
            ctx.fillStyle = l.color;
            ctx.fillRect(lx, 6, 16, 12);
            ctx.fillStyle = '#333';
            ctx.fillText(l.label, lx + 20, 16);
            lx += ctx.measureText(l.label).width + 40;
        });
    }

    draw();
    /*]]>*/
</script>
</body>
</html>
