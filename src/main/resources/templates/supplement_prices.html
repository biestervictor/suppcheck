<!-- language: html -->
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Preisentwicklung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 32px 0 16px 0;
            text-align: center;
            color: #2d6cdf;
        }

        .container {
            width: 70%;
            margin: 24px auto;
            background: #fff;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-radius: 6px;
        }

        canvas {
            width: 100%;
            height: 360px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th, td {
            padding: 10px 14px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        th {
            background: #eaf1fb;
        }

    </style>
    <th:block th:replace="~{fragments/nav :: nav-styles}"></th:block>
    <th:block th:replace="~{fragments/banner :: banner-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>

<h1 th:text="|Preisentwicklung: ${supplement.shop} - ${supplement.name}|">Preisentwicklung</h1>

<th:block th:if="${supplement.prices == null or supplement.prices.isEmpty()}">
    <th:block th:replace="~{fragments/banner :: banner('info', 'Fuer dieses Supplement sind aktuell noch keine Preiswerte gespeichert.')}"></th:block>
</th:block>

<div class="container">
    <canvas id="priceChart" width="900" height="360"></canvas>

    <table>
        <thead>
        <tr>
            <th>Datum</th>
            <th>Preis</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${supplement.prices}">
            <td th:text="${#temporals.format(p.date, 'yyyy-MM-dd')}">2026-01-01</td>
            <td th:text="${T(java.lang.String).format('%.2f €', p.price)}">0.00 €</td>
        </tr>
        </tbody>
    </table>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    const prices = /*[[${supplement.prices}]]*/ [];

    // simple canvas line chart without extra dependencies
    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');

    const padding = 40;
    const bottomPadding = 60; // more space for rotated date labels
    const w = canvas.width;
    const h = canvas.height;

    function drawAxes() {
        ctx.strokeStyle = '#c9d6ea';
        ctx.lineWidth = 1;
        ctx.beginPath();
        // y-axis
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, h - bottomPadding);
        // x-axis
        ctx.lineTo(w - padding, h - bottomPadding);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        drawAxes();

        if (!prices || prices.length === 0) {
            ctx.fillStyle = '#888';
            ctx.font = '16px Arial';
            ctx.fillText('Keine Preisdaten vorhanden.', padding, padding + 20);
            return;
        }

        const monthMap = {
            'JANUARY': 1, 'FEBRUARY': 2, 'MARCH': 3, 'APRIL': 4, 'MAY': 5, 'JUNE': 6,
            'JULY': 7, 'AUGUST': 8, 'SEPTEMBER': 9, 'OCTOBER': 10, 'NOVEMBER': 11, 'DECEMBER': 12
        };

        const values = prices.map(p => Number(p.price));
        const dates = prices.map(p => {
            // p.date can be an object {year, month, day} from Thymeleaf serialization
            if (typeof p.date === 'object' && p.date !== null) {
                const year = p.date.year || p.date.Year;
                let month = p.date.monthValue || p.date.Month || p.date.month;

                // Convert month enum string to number
                if (typeof month === 'string') {
                    month = monthMap[month.toUpperCase()] || 1;
                }

                const day = p.date.dayOfMonth || p.date.Day || p.date.day || 1;
                return `${day}.${month}.${year}`;
            }
            return String(p.date);
        });

        const min = Math.min(...values);
        const max = Math.max(...values);
        const range = (max - min) || 1;

        const plotW = (w - 2 * padding);
        const plotH = (h - padding - bottomPadding);

        const xStep = prices.length === 1 ? 0 : plotW / (prices.length - 1);

        // labels
        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText(max.toFixed(2) + ' €', 6, padding + 4);
        ctx.fillText(min.toFixed(2) + ' €', 6, h - bottomPadding);

        // line
        ctx.strokeStyle = '#2d6cdf';
        ctx.lineWidth = 2;
        ctx.beginPath();

        prices.forEach((p, i) => {
            const x = padding + i * xStep;
            const y = (h - bottomPadding) - ((Number(p.price) - min) / range) * plotH;
            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        });
        ctx.stroke();

        // points + price labels (above point) + date labels (below x-axis)
        prices.forEach((p, i) => {
            const x = padding + i * xStep;
            const y = (h - bottomPadding) - ((Number(p.price) - min) / range) * plotH;

            // point
            ctx.fillStyle = '#2d6cdf';
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fill();

            // price label above point
            ctx.fillStyle = '#2d6cdf';
            ctx.font = 'bold 11px Arial';
            const priceLabel = Number(p.price).toFixed(2) + ' €';
            const priceWidth = ctx.measureText(priceLabel).width;
            ctx.fillText(priceLabel, x - priceWidth / 2, y - 8);

            // date label on x-axis (full numeric format: DD.MM.YYYY)
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            const dateLabel = dates[i]; // use full DD.MM.YYYY
            ctx.save();
            ctx.translate(x, h - bottomPadding + 12);
            ctx.rotate(-Math.PI / 4); // 45 degree angle for better readability
            ctx.fillText(dateLabel, 0, 0);
            ctx.restore();
        });
    }

    draw();
    /*]]>*/
</script>
</body>
</html>
