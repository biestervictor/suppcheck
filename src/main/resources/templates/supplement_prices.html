<!-- language: html -->
<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
    <title>Preisentwicklung</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f7f7f7;
            margin: 0;
            padding: 0;
        }

        h1 {
            margin: 32px 0 16px 0;
            text-align: center;
            color: #2d6cdf;
        }

        .container {
            width: 70%;
            margin: 24px auto;
            background: #fff;
            padding: 18px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.07);
            border-radius: 6px;
        }

        canvas {
            width: 100%;
            height: 360px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 24px;
        }

        th, td {
            padding: 10px 14px;
            border-bottom: 1px solid #e0e0e0;
            text-align: left;
        }

        th {
            background: #eaf1fb;
        }

        /* ── Tabs ─────────────────────────────────────────────────────── */
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 18px;
            border-bottom: 2px solid #d0d8e8;
        }

        .tab-btn {
            background: #eaf1fb;
            color: #2d6cdf;
            border: 1px solid #d0d8e8;
            border-bottom: none;
            padding: 8px 20px;
            border-radius: 4px 4px 0 0;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: background 0.15s;
        }

        .tab-btn.active {
            background: #fff;
            color: #1b4e9b;
            border-bottom: 2px solid #fff;
            margin-bottom: -2px;
        }

        .tab-btn:hover:not(.active) {
            background: #d8e8f8;
        }

        /* ── Ingredient history ───────────────────────────────────────── */
        .ing-history-entry {
            margin-bottom: 28px;
        }

        .ing-history-date {
            font-weight: bold;
            color: #2d6cdf;
            font-size: 1.0em;
            margin-bottom: 8px;
            border-bottom: 1px solid #d0d8e8;
            padding-bottom: 4px;
        }

        .ing-change-added    { color: #1a7a3a; background: #d5f5e3; }
        .ing-change-removed  { color: #922b21; background: #fadbd8; }
        .ing-change-modified { color: #935116; background: #fdebd0; }

        .ing-change-added td:first-child::before    { content: '+ '; font-weight: bold; }
        .ing-change-removed td:first-child::before  { content: '− '; font-weight: bold; }
        .ing-change-modified td:first-child::before { content: '~ '; font-weight: bold; }

        .ing-history-empty {
            color: #888;
            font-style: italic;
            padding: 16px 0;
        }
    </style>
    <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>

<h1 th:text="|Preisentwicklung: ${supplement.shop} - ${supplement.name}|">Preisentwicklung</h1>

<th:block th:if="${supplement.prices == null or supplement.prices.isEmpty()}">
    <th:block th:replace="~{fragments/banner :: banner('info', 'Fuer dieses Supplement sind aktuell noch keine Preiswerte gespeichert.')}"></th:block>
</th:block>

<div class="container">

    <!-- ── Tab navigation ── -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-btn-prices"
                onclick="showTab('prices')">Preisentwicklung</button>
        <button class="tab-btn" id="tab-btn-ingredients"
                onclick="showTab('ingredients')">Zutaten-Entwicklung</button>
    </div>

    <!-- ── Tab: Preisentwicklung ── -->
    <div id="tab-prices">
        <canvas id="priceChart" width="900" height="360"></canvas>

        <table>
            <thead>
            <tr>
                <th>Datum</th>
                <th>Preis</th>
                <th>OVP</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="p : ${supplement.prices}">
                <td th:text="${#temporals.format(p.date, 'yyyy-MM-dd')}">2026-01-01</td>
                <td th:text="${T(java.lang.String).format('%.2f €', p.price)}">0.00 €</td>
                <td th:text="${p.ovp > 0 ? T(java.lang.String).format('%.2f €', p.ovp) : '-'}">0.00 €</td>
            </tr>
            </tbody>
        </table>
    </div>

    <!-- ── Tab: Zutaten-Entwicklung ── -->
    <div id="tab-ingredients" style="display:none">

        <th:block th:if="${ingredientHistoryReversed.isEmpty()}">
            <p class="ing-history-empty">Noch keine Zutatenänderungen erfasst.
                Änderungen werden beim nächsten Speichern automatisch aufgezeichnet.</p>
        </th:block>

        <!-- Entries in reverse chronological order (newest first) -->
        <th:block th:each="entry, stat : ${ingredientHistoryReversed}">
            <div class="ing-history-entry">
                <div class="ing-history-date"
                     th:text="${#temporals.format(entry.date, 'dd.MM.yyyy')}">01.01.2026</div>
                <table>
                    <thead>
                    <tr>
                        <th>Zutat</th>
                        <th>Änderung</th>
                        <th>Vorher</th>
                        <th>Nachher</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${entry.changes}"
                        th:classappend="${c.changeType == 'ADDED'} ? 'ing-change-added' :
                                        (${c.changeType == 'REMOVED'} ? 'ing-change-removed' : 'ing-change-modified')">
                        <td th:text="${c.name}">L-Leucin</td>
                        <td th:text="${c.changeType == 'ADDED'} ? 'Hinzugefügt' :
                                      (${c.changeType == 'REMOVED'} ? 'Entfernt' : 'Wert geändert')">-</td>
                        <td th:text="${c.oldMg != null} ? ${#numbers.formatDecimal(c.oldMg, 1, 3)} + ' mg' : '–'">–</td>
                        <td th:text="${c.newMg != null} ? ${#numbers.formatDecimal(c.newMg, 1, 3)} + ' mg' : '–'">–</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </th:block>
    </div>

</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // ── Tab switching ──────────────────────────────────────────────────────
    function showTab(name) {
        document.getElementById('tab-prices').style.display     = name === 'prices'      ? '' : 'none';
        document.getElementById('tab-ingredients').style.display = name === 'ingredients' ? '' : 'none';
        document.getElementById('tab-btn-prices').classList.toggle('active',     name === 'prices');
        document.getElementById('tab-btn-ingredients').classList.toggle('active', name === 'ingredients');
        if (name === 'prices') draw();
    }

    // ── Price chart (unchanged) ────────────────────────────────────────────
    const prices = /*[[${supplement.prices}]]*/ [];

    const canvas = document.getElementById('priceChart');
    const ctx = canvas.getContext('2d');

    const padding = 40;
    const bottomPadding = 60;
    const w = canvas.width;
    const h = canvas.height;

    const monthMap = {
        'JANUARY': 1, 'FEBRUARY': 2, 'MARCH': 3, 'APRIL': 4, 'MAY': 5, 'JUNE': 6,
        'JULY': 7, 'AUGUST': 8, 'SEPTEMBER': 9, 'OCTOBER': 10, 'NOVEMBER': 11, 'DECEMBER': 12
    };

    function parseDate(d) {
        if (typeof d === 'object' && d !== null) {
            const year = d.year || d.Year;
            let month = d.monthValue || d.Month || d.month;
            if (typeof month === 'string') month = monthMap[month.toUpperCase()] || 1;
            const day = d.dayOfMonth || d.Day || d.day || 1;
            return `${day}.${month}.${year}`;
        }
        return String(d);
    }

    function drawAxes() {
        ctx.strokeStyle = '#c9d6ea';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, padding);
        ctx.lineTo(padding, h - bottomPadding);
        ctx.lineTo(w - padding, h - bottomPadding);
        ctx.stroke();
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        drawAxes();

        if (!prices || prices.length === 0) {
            ctx.fillStyle = '#888';
            ctx.font = '16px Arial';
            ctx.fillText('Keine Preisdaten vorhanden.', padding, padding + 20);
            return;
        }

        const priceValues = prices.map(p => Number(p.price));
        const ovpValues = prices.map(p => Number(p.ovp));
        const dates = prices.map(p => parseDate(p.date));

        const allValues = [...priceValues.filter(v => v > 0), ...ovpValues.filter(v => v > 0)];
        if (allValues.length === 0) { return; }
        const min = Math.min(...allValues);
        const max = Math.max(...allValues);
        const range = (max - min) || 1;

        const plotW = (w - 2 * padding);
        const plotH = (h - padding - bottomPadding);
        const xStep = prices.length === 1 ? 0 : plotW / (prices.length - 1);

        ctx.fillStyle = '#333';
        ctx.font = '12px Arial';
        ctx.fillText(max.toFixed(2) + ' €', 6, padding + 4);
        ctx.fillText(min.toFixed(2) + ' €', 6, h - bottomPadding);

        function drawLine(extractFn, color) {
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            let started = false;
            prices.forEach((p, i) => {
                const val = extractFn(p);
                if (val <= 0) return;
                const x = padding + i * xStep;
                const y = (h - bottomPadding) - ((val - min) / range) * plotH;
                if (!started) { ctx.moveTo(x, y); started = true; } else { ctx.lineTo(x, y); }
            });
            ctx.stroke();

            prices.forEach((p, i) => {
                const val = extractFn(p);
                if (val <= 0) return;
                const x = padding + i * xStep;
                const y = (h - bottomPadding) - ((val - min) / range) * plotH;
                ctx.fillStyle = color;
                ctx.beginPath();
                ctx.arc(x, y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.font = 'bold 11px Arial';
                const label = val.toFixed(2) + ' €';
                const lw = ctx.measureText(label).width;
                ctx.fillText(label, x - lw / 2, y - 8);
            });
        }

        prices.forEach((p, i) => {
            const x = padding + i * xStep;
            ctx.fillStyle = '#333';
            ctx.font = '12px Arial';
            ctx.save();
            ctx.translate(x, h - bottomPadding + 12);
            ctx.rotate(-Math.PI / 4);
            ctx.fillText(dates[i], 0, 0);
            ctx.restore();
        });

        drawLine(p => Number(p.price), '#2d6cdf');
        drawLine(p => Number(p.ovp), '#e68a00');

        const legends = [
            { label: 'Preis', color: '#2d6cdf' },
            { label: 'OVP', color: '#e68a00' }
        ];
        let lx = padding;
        ctx.font = '13px Arial';
        legends.forEach(l => {
            ctx.fillStyle = l.color;
            ctx.fillRect(lx, 6, 16, 12);
            ctx.fillStyle = '#333';
            ctx.fillText(l.label, lx + 20, 16);
            lx += ctx.measureText(l.label).width + 40;
        });
    }

    draw();
    /*]]>*/
</script>
</body>
</html>
