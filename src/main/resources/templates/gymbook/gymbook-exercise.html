<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
  <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
  <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
  <title th:text="${exerciseName != null ? exerciseName + ' – GymBook' : 'Übung wählen – GymBook'}">Übung</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; color: #333; margin: 0; }

    .exercise-select {
      width: 100%; padding: .6rem 1rem;
      background: #fff; border: 1px solid #e0e0e0;
      border-radius: 8px; color: #333; font-size: 1rem; margin-bottom: 1.5rem;
    }
    .exercise-select:focus { outline: none; border-color: #2d6cdf; }

    .chart-card {
      background: #fff; border-radius: 8px; padding: 1.5rem;
      margin-bottom: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }
    .chart-card h3 { color: #2d6cdf; margin: 0 0 1rem; }

    .log-table { width: 100%; border-collapse: collapse; font-size: .9rem; }
    .log-table th {
      text-align: left; padding: .6rem .8rem;
      background: #eaf1fb; color: #444;
      border-bottom: 1px solid #e0e0e0; font-weight: 500;
    }
    .log-table td { padding: .55rem .8rem; border-bottom: 1px solid #f0f0f0; }
    .log-table tr:hover td { background: #f5f8ff; }

    .set-badge {
      display: inline-block; background: #f0f4ff; border: 1px solid #ccd9f5;
      border-radius: 4px; padding: .1rem .45rem; margin: .1rem;
      font-size: .78rem; color: #444;
    }
    .pr-badge { background: #fff7ed; border-color: #fb923c; color: #c2410c; }
  </style>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>
<main style="max-width:1000px;margin:2rem auto;padding:0 1rem">

  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h1 style="margin:0;color:#2d6cdf" th:text="${exerciseName != null ? exerciseName : 'Übung auswählen'}">Übung</h1>
    <a th:href="@{/gymbook}"
       style="padding:.45rem 1rem;background:#fff;border:1px solid #e0e0e0;border-radius:6px;color:#333;text-decoration:none;font-size:.9rem;">
      Dashboard
    </a>
  </div>

  <!-- Übung auswählen -->
  <select class="exercise-select" id="exerciseSelect" onchange="navigateToExercise(this.value)">
    <option value="">– Übung wählen –</option>
    <option th:each="ex : ${allExercises}"
            th:value="${ex}"
            th:text="${ex}"
            th:selected="${ex == exerciseName}"></option>
  </select>

  <!-- Gewichtsverlauf-Chart -->
  <div th:if="${progressData != null and !progressData.isEmpty()}">
    <div class="chart-card">
      <h3>Maximales Gewicht pro Training (kg)</h3>
      <canvas id="weightChart" height="100"></canvas>
    </div>

    <!-- Trainingsprotokoll -->
    <h2 style="color:#2d6cdf">Trainingsprotokoll</h2>
    <div style="background:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.07);overflow:hidden">
      <table class="log-table">
        <thead>
          <tr>
            <th>Datum</th>
            <th>Max (kg)</th>
            <th>Sätze</th>
            <th>Wdh.</th>
            <th>Satz-Details</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="p : ${progressData}">
            <td th:text="${p.date}" style="font-weight:600;white-space:nowrap"></td>
            <td>
              <span th:text="${#numbers.formatDecimal(p.maxWeightKg,1,1)}"></span> kg
            </td>
            <td th:text="${p.totalSets}"></td>
            <td th:text="${p.totalReps}"></td>
            <td>
              <span th:each="s : ${p.sets}"
                    th:classappend="${s.weightKg == p.maxWeightKg ? ' pr-badge' : ''}"
                    th:text="${#numbers.formatDecimal(s.weightKg,1,1) + ' kg × ' + s.reps}"
                    class="set-badge"></span>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Keine Daten -->
  <div th:if="${exerciseName != null and (progressData == null or progressData.isEmpty())}"
       style="color:#888;padding:2rem;text-align:center">
    Keine Daten für diese Übung gefunden.
  </div>
</main>

<script th:inline="javascript">
const labels  = /*[[${dateLabels}]]*/ [];
const weights = /*[[${weightValues}]]*/ [];

if (labels.length > 0) {
  new Chart(document.getElementById('weightChart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'Max. Gewicht (kg)',
        data: weights,
        borderColor: '#2d6cdf',
        backgroundColor: 'rgba(45,108,223,0.08)',
        pointBackgroundColor: '#2d6cdf',
        pointRadius: 4,
        fill: true,
        tension: 0.3
      }]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ctx.parsed.y + ' kg' } }
      },
      scales: {
        x: { ticks: { color: '#888', maxTicksLimit: 12 }, grid: { color: '#e0e0e0' } },
        y: { ticks: { color: '#888', callback: v => v + ' kg' }, grid: { color: '#e0e0e0' } }
      }
    }
  });
}

function navigateToExercise(name) {
  if (name) window.location.href = '/gymbook/exercise/' + encodeURIComponent(name);
}
</script>
</body>
</html>
