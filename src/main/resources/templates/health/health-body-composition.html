<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
    <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
    <title>Körperzusammensetzung</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        h1   { margin: 28px 0 16px; text-align: center; color: #2d6cdf; }
        h2   { color: #2d6cdf; margin: 0 0 10px; }
        .page-content { max-width: 1300px; margin: 0 auto; padding: 0 20px 40px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(580px, 1fr)); gap: 20px; }
        .chart-card { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .back-link { color: #2d6cdf; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
        /* Range-Bar */
        .range-bar { display: flex; gap: .4rem; flex-wrap: wrap; }
        .range-btn { padding: .25rem .7rem; border-radius: 16px; border: 1px solid #e0e0e0; background: #fff; color: #555; cursor: pointer; font-size: .8rem; transition: all .15s; }
        .range-btn:hover, .range-btn.active { border-color: #2d6cdf; color: #2d6cdf; background: #eaf1fb; font-weight: 600; }
        .page-range-bar { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; background: #fff; border-radius: 8px; padding: 12px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); margin-bottom: 24px; }
        .page-range-bar span { font-size: .85rem; color: #888; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>
<div class="page-content">
<h1>Körperzusammensetzung</h1>
<p><a class="back-link" th:href="@{/health}">← Zurück zum Dashboard</a></p>

<!-- ── Page-level Range-Bar ─────────────────────────────────────────────── -->
<div class="page-range-bar">
    <span>Zeitraum:</span>
    <div class="range-bar" id="pageRangeBar">
        <button class="range-btn active" onclick="setRange(7,this)">7T</button>
        <button class="range-btn" onclick="setRange(30,this)">1M</button>
        <button class="range-btn" onclick="setRange(90,this)">3M</button>
        <button class="range-btn" onclick="setRange(365,this)">1J</button>
        <button class="range-btn" onclick="setRange(0,this)">Alle</button>
    </div>
</div>

<div class="chart-grid">
    <div class="chart-card"><h2>Körpergewicht (kg)</h2><canvas id="bodyMassChart"></canvas></div>
    <div class="chart-card"><h2>Körperfett (%)</h2><canvas id="bodyFatChart"></canvas></div>
    <div class="chart-card"><h2>Muskelmasse / Lean Body Mass (kg)</h2><canvas id="leanMassChart"></canvas></div>
    <div class="chart-card"><h2>BMI (kg/m²)</h2><canvas id="bmiChart"></canvas></div>
</div>
</div>
<script th:inline="javascript">
    // ── Alle Daten vom Server ───────────────────────────────────────────────
    const allBodyMassLabels = /*[[${bodyMassLabels}]]*/ [];
    const allBodyMassValues = /*[[${bodyMassValues}]]*/ [];
    const allBodyFatLabels  = /*[[${bodyFatLabels}]]*/ [];
    const allBodyFatValues  = /*[[${bodyFatValues}]]*/ [];
    const allLeanMassLabels = /*[[${leanMassLabels}]]*/ [];
    const allLeanMassValues = /*[[${leanMassValues}]]*/ [];
    const allBmiLabels      = /*[[${bmiLabels}]]*/ [];
    const allBmiValues      = /*[[${bmiValues}]]*/ [];

    // ── Filter-Hilfsfunktion ────────────────────────────────────────────────
    function filterPair(labels, values, days) {
        if (!days) return { labels, values };
        const d = new Date(); d.setDate(d.getDate() - days);
        const cutoff = d.toISOString().slice(0, 10);
        const pairs = labels.map((l, i) => [l, values[i]]).filter(([l]) => l >= cutoff);
        return { labels: pairs.map(p => p[0]), values: pairs.map(p => p[1]) };
    }

    // ── Chart-Ersteller ─────────────────────────────────────────────────────
    function makeLine(id, labels, values, label, color) {
        return new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels, datasets: [{ label, data: values, borderColor: color,
                backgroundColor: color + '22', borderWidth: 1.5,
                pointRadius: labels.length > 200 ? 0 : 2, tension: 0.2, fill: true }] },
            options: { responsive: true, plugins: { legend: { display: false } },
                       scales: { y: { beginAtZero: false } } }
        });
    }

    // ── Initiale Charts (7T) ────────────────────────────────────────────────
    const initBM = filterPair(allBodyMassLabels, allBodyMassValues, 7);
    const initBF = filterPair(allBodyFatLabels,  allBodyFatValues,  7);
    const initLM = filterPair(allLeanMassLabels, allLeanMassValues, 7);
    const initBi = filterPair(allBmiLabels,      allBmiValues,      7);

    const bodyMassChart = makeLine('bodyMassChart', initBM.labels, initBM.values, 'Gewicht (kg)',     '#2d6cdf');
    const bodyFatChart  = makeLine('bodyFatChart',  initBF.labels, initBF.values, 'Körperfett (%)',   '#e74c3c');
    const leanMassChart = makeLine('leanMassChart', initLM.labels, initLM.values, 'Muskelmasse (kg)', '#27ae60');
    const bmiChart      = makeLine('bmiChart',      initBi.labels, initBi.values, 'BMI',              '#f39c12');

    // ── Range-Wechsel ───────────────────────────────────────────────────────
    function updateChart(chart, labels, values) {
        chart.data.labels = labels;
        chart.data.datasets[0].data = values;
        chart.data.datasets[0].pointRadius = labels.length > 200 ? 0 : 2;
        chart.update();
    }

    function setRange(days, btn) {
        document.querySelectorAll('#pageRangeBar .range-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const bm = filterPair(allBodyMassLabels, allBodyMassValues, days);
        const bf = filterPair(allBodyFatLabels,  allBodyFatValues,  days);
        const lm = filterPair(allLeanMassLabels, allLeanMassValues, days);
        const bi = filterPair(allBmiLabels,      allBmiValues,      days);

        updateChart(bodyMassChart, bm.labels, bm.values);
        updateChart(bodyFatChart,  bf.labels, bf.values);
        updateChart(leanMassChart, lm.labels, lm.values);
        updateChart(bmiChart,      bi.labels, bi.values);
    }
</script>
</body>
</html>
