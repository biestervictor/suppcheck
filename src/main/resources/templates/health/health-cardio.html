<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{fragments/head :: common-meta}"></th:block>
    <th:block th:replace="~{fragments/head :: common-ui-styles}"></th:block>
    <title>Kardio &amp; Schlaf</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; padding: 0; }
        h1   { margin: 28px 0 16px; text-align: center; color: #2d6cdf; }
        h2   { color: #2d6cdf; margin: 0 0 10px; }
        .page-content { max-width: 1300px; margin: 0 auto; padding: 0 20px 40px; }
        .chart-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(580px, 1fr)); gap: 20px; }
        .chart-card { background: #fff; border-radius: 8px; padding: 20px 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
        .back-link { color: #2d6cdf; text-decoration: none; font-size: 0.9em; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
<th:block th:replace="~{fragments/nav :: main-nav}"></th:block>
<div class="page-content">
<h1>Kardio &amp; Schlaf</h1>
<p><a class="back-link" th:href="@{/health}">← Zurück zum Dashboard</a></p>
<div class="chart-grid">
    <div class="chart-card"><h2>VO₂Max (alle Messungen)</h2><canvas id="vo2maxChart"></canvas></div>
    <div class="chart-card"><h2>Ruhepuls (alle Messungen)</h2><canvas id="restingHrChart"></canvas></div>
    <div class="chart-card"><h2>Schlaf (h) – letzte 90 Tage</h2><canvas id="sleepChart"></canvas></div>
    <div class="chart-card"><h2>Ø Herzfrequenz – letzte 90 Tage</h2><canvas id="avgHrChart"></canvas></div>
    <div class="chart-card"><h2>HRV (ms) – letzte 90 Tage</h2><canvas id="hrvChart"></canvas></div>
</div>
</div>
<script th:inline="javascript">
    const vo2maxLabels    = /*[[${vo2maxLabels}]]*/ [];
    const vo2maxValues    = /*[[${vo2maxValues}]]*/ [];
    const restingHrLabels = /*[[${restingHrLabels}]]*/ [];
    const restingHrValues = /*[[${restingHrValues}]]*/ [];
    const dailyLabels     = /*[[${dailyLabels}]]*/ [];
    const sleepValues     = /*[[${sleepValues}]]*/ [];
    const avgHrValues     = /*[[${avgHrValues}]]*/ [];
    const hrvValues       = /*[[${hrvValues}]]*/ [];
    function line(id, labels, values, label, color, fill) {
        new Chart(document.getElementById(id), {
            type: 'line',
            data: { labels, datasets: [{ label, data: values, borderColor: color,
                backgroundColor: color + '22', borderWidth: 1.5,
                pointRadius: labels.length > 100 ? 0 : 2, tension: 0.2, fill: fill !== false }] },
            options: { responsive: true, plugins: { legend: { display: false } },
                       scales: { y: { beginAtZero: false } } }
        });
    }
    line('vo2maxChart',    vo2maxLabels,    vo2maxValues,    'VO₂Max',         '#27ae60');
    line('restingHrChart', restingHrLabels, restingHrValues, 'Ruhepuls (bpm)', '#e74c3c');
    line('sleepChart',     dailyLabels,     sleepValues,     'Schlaf (h)',      '#8e44ad');
    line('avgHrChart',     dailyLabels,     avgHrValues,     'Ø HF (bpm)',      '#e67e22', false);
    line('hrvChart',       dailyLabels,     hrvValues,       'HRV (ms)',        '#2980b9');
</script>
</body>
</html>
