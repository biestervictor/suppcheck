spring.application.name=suppCheck
spring.mongodb.uri=${SPRING_MONGODB_URI:mongodb://mongodb-service.treasury.svc.cluster.local:27017/suppcheck}
spring.thymeleaf.cache=false

app.version=@project.version@
app.build.timestamp=@maven.build.timestamp@

# Actuator Health Probes
management.endpoints.access.default=none
management.endpoint.health.access=read_only
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.health.group.readiness.include=mongo

